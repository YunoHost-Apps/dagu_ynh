#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.6.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.0/dagu_2.6.0_linux_amd64.tar.gz"
    amd64.sha256 = "3896e3cfeb265666623634ec09fcddd60f4df91978426530b3890c6e0bd9b75a"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.0/dagu_2.6.0_linux_arm64.tar.gz"
    arm64.sha256 = "27b69ddd9963757a26d90837b8da26683403a648900d11fceb9209e2ce917fcc"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.0/dagu_2.6.0_linux_armv7.tar.gz"
    armhf.sha256 = "cac90a073ac38d2211e0a6bd2f4d5abe82c91f659ed20c0bfbadffdfd35aad0d"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
