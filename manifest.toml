#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.2.3~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.2.3/dagu_2.2.3_linux_amd64.tar.gz"
    amd64.sha256 = "63a5fb8261a17d9dd8bdc4da80eb41602ee61ebc163e7a7e7465911b27a095f8"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.2.3/dagu_2.2.3_linux_arm64.tar.gz"
    arm64.sha256 = "93af664ec53dff790408abdf1e3f6d19cd395147aba41271817b2ec33f516123"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.2.3/dagu_2.2.3_linux_armv7.tar.gz"
    armhf.sha256 = "e9a84b38bcd2394459b19e052d3120eefae373f247fe0e683db15735df0e82b0"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
