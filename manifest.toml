#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.3.6~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.6/dagu_2.3.6_linux_amd64.tar.gz"
    amd64.sha256 = "0d6122ad356173ed412b24783a897971f3ea2dbebcbf97e0a2eef1ba31d52f52"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.6/dagu_2.3.6_linux_arm64.tar.gz"
    arm64.sha256 = "8332e995c713a22f102539d54e06f0d66ae5dce52c20e75e85b1779e0a51c351"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.6/dagu_2.3.6_linux_armv7.tar.gz"
    armhf.sha256 = "fe03f0060556ce809b4d2a85f63a93a9c8b34cad7c1c6047e5b1d2a836b19539"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
