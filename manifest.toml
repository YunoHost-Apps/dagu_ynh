#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.3.10~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.10/dagu_2.3.10_linux_amd64.tar.gz"
    amd64.sha256 = "f44397d5ef1afb41d382741c4c3ee5346931cb623c5c33e760ff80724939acc2"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.10/dagu_2.3.10_linux_arm64.tar.gz"
    arm64.sha256 = "4896549faaf8adb1e797e7cf2ba39bb723c854a154304a75d0868f17903ee0dd"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.10/dagu_2.3.10_linux_armv7.tar.gz"
    armhf.sha256 = "62aade7425b5e5ec9de1d9ff278bb941193e2a17e9149a648428788b665f1067"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
