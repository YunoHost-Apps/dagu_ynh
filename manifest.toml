#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.7.3~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.7.3/dagu_2.7.3_linux_amd64.tar.gz"
    amd64.sha256 = "c64928fb44394a71cd2b2102ee0d3bb8fb28eff7f671eb5da7690091e2bc0b28"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.7.3/dagu_2.7.3_linux_arm64.tar.gz"
    arm64.sha256 = "6c05232120846be732d6b89a7ed2deb4f594004d852f569b12f052660ce2849b"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.7.3/dagu_2.7.3_linux_armv7.tar.gz"
    armhf.sha256 = "4137688df9d9b24aff705cd157f8a3affee866300a484e546453eac8c7b91afb"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
