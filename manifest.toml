#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.3.9~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.9/dagu_2.3.9_linux_amd64.tar.gz"
    amd64.sha256 = "4dea3197ae6dc07bbf1760e1048d57603cd76970777132d9edc8129677cef5e8"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.9/dagu_2.3.9_linux_arm64.tar.gz"
    arm64.sha256 = "56103b17e471ed12711368e03340a933829ed59b4da907fc1de0dd8bfc76dd46"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.9/dagu_2.3.9_linux_armv7.tar.gz"
    armhf.sha256 = "f5f5a1b1556e01ce62d17ecb42eb97ae10f99ff3c200be65eba5c3789dd2feb2"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
