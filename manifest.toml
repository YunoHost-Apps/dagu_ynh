#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.3.3~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.3/dagu_2.3.3_linux_amd64.tar.gz"
    amd64.sha256 = "5b7d4e9d71eb2dcb12ca4a5136db563ab1bf1aa52f6df7f708df75eacd284541"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.3/dagu_2.3.3_linux_arm64.tar.gz"
    arm64.sha256 = "161eb0176533d5c0da5c22ad8b454a56a3500d34a115276b98fc344e28f01cbb"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.3/dagu_2.3.3_linux_armv7.tar.gz"
    armhf.sha256 = "12c2de269ff026ace76e757dbd60c43d96fa1b0509282778cf18010634d880f9"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
