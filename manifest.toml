#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.3.5~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.5/dagu_2.3.5_linux_amd64.tar.gz"
    amd64.sha256 = "df62346f8c0a221b81af897500f963e65b3a960919abcc166a018d0a0d59d435"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.5/dagu_2.3.5_linux_arm64.tar.gz"
    arm64.sha256 = "abcbb9b2f46c0855d4d3c4c4712ec57d33a14df71a36fe9afd3f555d9a4dd7f5"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.5/dagu_2.3.5_linux_armv7.tar.gz"
    armhf.sha256 = "0f4df3202690a00aacca7e49998e8ed760d1e70df5f910086769101e2e884272"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
