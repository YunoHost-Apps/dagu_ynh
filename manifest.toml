#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.3.1~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.1/dagu_2.3.1_linux_amd64.tar.gz"
    amd64.sha256 = "30cf225858c301ba0e6e7caf18fa054a8d516aa96211b0c13e9e1eac28310e2d"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.1/dagu_2.3.1_linux_arm64.tar.gz"
    arm64.sha256 = "2e8f87adaf7c67266f97250d9ff7959ab2eb0209db3f819951820f1b63c0328c"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.1/dagu_2.3.1_linux_armv7.tar.gz"
    armhf.sha256 = "651f3125ced68d82a49e1680b627f10f37acb4c142a078e159ff535135c56c3e"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
