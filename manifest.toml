#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.1.3~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.1.3/dagu_2.1.3_linux_amd64.tar.gz"
    amd64.sha256 = "a8e55ec533409256b3de4e7807e07dcd964d91b555138133ad18c82682f9be4c"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.1.3/dagu_2.1.3_linux_arm64.tar.gz"
    arm64.sha256 = "30b4308515d79df5830e611677bae2db3420a9b81f0535c03829d5971641bbd6"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.1.3/dagu_2.1.3_linux_armv7.tar.gz"
    armhf.sha256 = "c2cf8e008e448ec68b3bddc0744f23ba3708082cc157076628a6c1dd072da49d"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
