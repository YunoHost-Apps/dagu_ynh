#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.2.1~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.2.1/dagu_2.2.1_linux_amd64.tar.gz"
    amd64.sha256 = "995849d0f3bd9b277a561860f4ef91ebad59ff1b93a493d6604b28a8eb5677c7"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.2.1/dagu_2.2.1_linux_arm64.tar.gz"
    arm64.sha256 = "52cf404a7c0d44df3627a3df8367d529c24eb7548921c87ca5f8ce598ad9ec3e"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.2.1/dagu_2.2.1_linux_armv7.tar.gz"
    armhf.sha256 = "1a848d413599e456046f37d70df1801ff70d9b1f24632e2b124341a547a1feac"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
