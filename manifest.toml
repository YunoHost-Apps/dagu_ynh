#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.6.5~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.5/dagu_2.6.5_linux_amd64.tar.gz"
    amd64.sha256 = "02729abe232ecfcee28365bbb97cfd84c3c5121f4a4e22db054fcbe69278de1c"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.5/dagu_2.6.5_linux_arm64.tar.gz"
    arm64.sha256 = "37b70cbf1f1ae64c96f0737bfe74499d95efb24ab302ebe93168e55eb6b61573"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.5/dagu_2.6.5_linux_armv7.tar.gz"
    armhf.sha256 = "89997b6bc51e31572f8fab1f593507762a3a5754628e4c2365d3d112c590d3b0"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
