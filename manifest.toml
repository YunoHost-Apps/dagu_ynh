#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.6.8~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.8/dagu_2.6.8_linux_amd64.tar.gz"
    amd64.sha256 = "cc06887dd19da19856f5be5bbc984d43dc905e4403826954113eab17ef3732fb"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.8/dagu_2.6.8_linux_arm64.tar.gz"
    arm64.sha256 = "7a76f7fd96ded3c6818958a0970810c9bf62e9f717498c35fc78aa8ce1bd8287"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.8/dagu_2.6.8_linux_armv7.tar.gz"
    armhf.sha256 = "596f0c541930baa22ab2e9ff9c3b2175f076e916d1bca9bda2fffb0dbd69c251"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
