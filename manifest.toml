#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.3.7~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.7/dagu_2.3.7_linux_amd64.tar.gz"
    amd64.sha256 = "16c03b7337c72d698b4a4290507c69bc26c62da4bda60a1cb2685bde93be6dba"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.7/dagu_2.3.7_linux_arm64.tar.gz"
    arm64.sha256 = "76e186ea5b6249c1256dc082dd40db06749e582f349be45d348237f4aae24e8e"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.3.7/dagu_2.3.7_linux_armv7.tar.gz"
    armhf.sha256 = "f1e9888840de86ad2cdfb630caeb6e268d693de1aa08132de7c97f85913c30cc"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
