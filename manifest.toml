#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.6.2~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.2/dagu_2.6.2_linux_amd64.tar.gz"
    amd64.sha256 = "0a2a674bad4c50dbeb3e436833f999bf5131ee6e944081bbf1fa6bfb712064c4"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.2/dagu_2.6.2_linux_arm64.tar.gz"
    arm64.sha256 = "eae42287faf268b93ba5b625f520043cef530edd7bb78c496c7e764626eae41e"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.2/dagu_2.6.2_linux_armv7.tar.gz"
    armhf.sha256 = "092229402e335bcb79662a6a97d01b057e8fd841eb0162c5f05f1c336688ff06"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
