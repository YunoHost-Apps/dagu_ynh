#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.6.9~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.9/dagu_2.6.9_linux_amd64.tar.gz"
    amd64.sha256 = "c682f0a6edfb90d9156ebaf26664b8011863417bc00f5d62d287213d2a41ff64"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.9/dagu_2.6.9_linux_arm64.tar.gz"
    arm64.sha256 = "e3f1442a6a7ab19b9d8107d3adadba388425030dcdf9d73e6baf213156e405ab"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.9/dagu_2.6.9_linux_armv7.tar.gz"
    armhf.sha256 = "e99413342472878f8e3a00d9289c6b8e1851acfc6d8f982cb6d95948dca2ff5e"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
