#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.0.2~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://dagu.readthedocs.io/en/latest/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.2/dagu_2.0.2_linux_amd64.tar.gz"
    amd64.sha256 = "943b841559a5a7be2a55605516f4bde1216d8380b83ae0da55468035142e44be"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.2/dagu_2.0.2_linux_arm64.tar.gz"
    arm64.sha256 = "bfaa9c49edd12ff6ac84c1cb746d068d0d148fa8d3f18afdfb464706636c8e8f"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.2/dagu_2.0.2_linux_armv7.tar.gz"
    armhf.sha256 = "9d752a262a7fabc6b51b1bf6021ac9ea88d6a161f04e0d2c1c9988d4740c6b74"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
