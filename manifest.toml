#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.6.7~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.7/dagu_2.6.7_linux_amd64.tar.gz"
    amd64.sha256 = "92794c14a63066a4fec5be9f77d3f0f62c1dc1d097e0b8fe4aa139e6d0cffe52"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.7/dagu_2.6.7_linux_arm64.tar.gz"
    arm64.sha256 = "d472629ebddd4430ca3895332da32083e57052a5a5154260afb6d6925e25a0bd"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.7/dagu_2.6.7_linux_armv7.tar.gz"
    armhf.sha256 = "fa997af22e6b15da9469384679d4c88fa96a992f4fe325597baf01b61720dcd5"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
