#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.0.4~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.4/dagu_2.0.4_linux_amd64.tar.gz"
    amd64.sha256 = "688280e17ab871dfabceb564bd99f2d6e86588066050d5adadb49f0a2f73c325"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.4/dagu_2.0.4_linux_arm64.tar.gz"
    arm64.sha256 = "ce16a3ac3315611cf6544fd6b5d9ef070927d9aef6afb4f997b10686460df354"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.4/dagu_2.0.4_linux_armv7.tar.gz"
    armhf.sha256 = "c355c3dd18eab1ac761739148f58e930ae573f00c6001087c2f5bab7a4160b0f"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
