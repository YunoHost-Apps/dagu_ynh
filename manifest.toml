#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.5.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.5.0/dagu_2.5.0_linux_amd64.tar.gz"
    amd64.sha256 = "19e01449bd1292c6ce98601f7a2a66a9e99b59c6767e530a2dc7308cc2da4ca0"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.5.0/dagu_2.5.0_linux_arm64.tar.gz"
    arm64.sha256 = "48ba478011a2d8da710e2e4ea338dbda3c0e3ba85aa24581f968ff172aa2c9b5"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.5.0/dagu_2.5.0_linux_armv7.tar.gz"
    armhf.sha256 = "6d42af33b8d6fad49e342d67ebe22bf93ac23a17fe42ffcd79171a279eae3a63"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
