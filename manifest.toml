#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.0.5~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.5/dagu_2.0.5_linux_amd64.tar.gz"
    amd64.sha256 = "467cd3bf6c5440d3a464015579804ee8478ca2869df192c835541621f23b38e2"
    arm64.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.5/dagu_2.0.5_linux_arm64.tar.gz"
    arm64.sha256 = "d7189357c0e74ce528a352dbd50bf5a719cc49df3a6316c89e48cba24892eccc"
    armhf.url = "https://github.com/dagu-org/dagu/releases/download/v2.0.5/dagu_2.0.5_linux_armv7.tar.gz"
    armhf.sha256 = "e00a7c4b89735503d3df363a951351a2dd1d16e63ff1cbd840b172ef3a1835a3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
