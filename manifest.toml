#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.7.2~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.7.2/dagu_2.7.2_linux_amd64.tar.gz"
    amd64.sha256 = "bcc88878744c2986ba8d41744682c9fe84aca9f1e51f69a5cb205442e92167c9"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.7.2/dagu_2.7.2_linux_arm64.tar.gz"
    arm64.sha256 = "e01173564ca70dcf6e9c40bcd296a3524fc054be45b37a1f35dc0fd4ab0fc725"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.7.2/dagu_2.7.2_linux_armv7.tar.gz"
    armhf.sha256 = "c710f99d3e74efa04576bd2473737490f74c1f0e08b9e2f3103a5b8ca52b7bab"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
