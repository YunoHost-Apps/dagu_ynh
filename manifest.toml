#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.6.1~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.1/dagu_2.6.1_linux_amd64.tar.gz"
    amd64.sha256 = "a582b234f328e16e11abcafa2eba37077370621060c136723f9b597298a7e13e"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.1/dagu_2.6.1_linux_arm64.tar.gz"
    arm64.sha256 = "014651f3aded925acfa4319f49b34609a8959a7667a0c73ee6723154715dc522"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.6.1/dagu_2.6.1_linux_armv7.tar.gz"
    armhf.sha256 = "9e93760f60ed01f6d425763143510edd4242154c8350d04c0c35085fc4b66c80"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
