#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dagu"
name = "Dagu"
description.en = "Cron alternative that comes with a Web UI"
description.fr = "Alternative à Cron fournie avec une interface utilisateur Web"

version = "2.4.3~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
admindoc = "https://docs.daguit.dev/"
code = "https://github.com/dagu-org/dagu"
website = "https://dagu.cloud/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/dagucloud/dagu/releases/download/v2.4.3/dagu_2.4.3_linux_amd64.tar.gz"
    amd64.sha256 = "ae3217268f6af49f5cf683ad09c7308496686c5b707597339f4f8c943100a080"
    arm64.url = "https://github.com/dagucloud/dagu/releases/download/v2.4.3/dagu_2.4.3_linux_arm64.tar.gz"
    arm64.sha256 = "845e3c9fa41b53650f24c44b758fc88f6f1a4ff4654121b05600df1e4023ce52"
    armhf.url = "https://github.com/dagucloud/dagu/releases/download/v2.4.3/dagu_2.4.3_linux_armv7.tar.gz"
    armhf.sha256 = "2e83c6490a6e8f74cd3ff1c32822ed0588c5686c7586385de5643e595213751e"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^dagu_.*_linux_amd64.tar.gz$"
    autoupdate.asset.armhf = "^dagu_.*_linux_armv7.tar.gz$"
    autoupdate.asset.arm64 = "^dagu_.*_linux_arm64.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
